<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hors ligne | IntraPo</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eaf0ff 0%, #f7f9ff 55%, #ffffff 100%);
        color: #10214f;
        padding: 1.2rem;
      }

      .card {
        width: min(480px, 100%);
        border-radius: 20px;
        border: 1px solid rgba(31, 73, 255, 0.2);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 40px -30px rgba(20, 38, 85, 0.55);
        text-align: center;
        padding: 1.4rem 1.2rem;
      }

      h1 {
        margin: 0 0 0.6rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        color: #415489;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Vous etes hors ligne</h1>
      <p>La connexion reseau est indisponible. Reessayez des que vous retrouvez l'acces Internet.</p>
    </main>
  </body>
</html>
